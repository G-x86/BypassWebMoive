<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎬 GodGi Movie Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>

<body>

<h2>🍿 วางลิงก์หนังเพื่อรับชม</h2>

<input type="text" id="movie-url" placeholder="วางลิงก์...">
<button id="search-btn">ดึงข้อมูลตอน</button>

<div id="status-message"></div>

<video id="video-player" controls style="width:100%; display:none;"></video>

<div id="episode-container" style="display:none;">
    <h3>เลือกตอน:</h3>
    <div id="episode-list"></div>
</div>

<div id="grid-movie"></div>

<script>
/* =========================
   🔥 CONFIG
========================= */
const PROXY_BASE = "http://192.168.100.176:1234";
// const PROXY_BASE = window.location.origin;

/* =========================
   PLAYER
========================= */
let hlsPlayer = null;

function playVideo(m3u8Url, btnElement) {
    const video = document.getElementById('video-player');
    video.style.display = 'block';

    document.querySelectorAll('.episode-btn').forEach(btn => btn.classList.remove('active'));
    if (btnElement) btnElement.classList.add('active');

    if (hlsPlayer) hlsPlayer.destroy();

    if (Hls.isSupported()) {
        hlsPlayer = new Hls();
        hlsPlayer.loadSource(m3u8Url);
        hlsPlayer.attachMedia(video);
        hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => video.play());
    } else {
        video.src = m3u8Url;
        video.play();
    }
}

/* =========================
   FETCH EPISODES
========================= */
async function fetchAndExtractEpisodes(targetUrl) {
    const statusMsg = document.getElementById('status-message');
    const episodeList = document.getElementById('episode-list');
    const episodeContainer = document.getElementById('episode-container');
    const video = document.getElementById('video-player');

    episodeList.innerHTML = '';
    episodeContainer.style.display = 'none';
    video.style.display = 'none';

    if (hlsPlayer) hlsPlayer.destroy();
    video.pause();
    video.removeAttribute('src');

    statusMsg.innerText = '⏳ กำลังโหลด...';

    try {
        const proxyUrl = `${PROXY_BASE}/api/proxy?url=${encodeURIComponent(targetUrl)}`;

        const res = await fetch(proxyUrl);
        if (!res.ok) throw new Error('โหลดไม่ได้');

        const html = await res.text();
        const doc = new DOMParser().parseFromString(html, 'text/html');

        const episodeLinks = doc.querySelectorAll('a.player-1-btn-link');

        if (episodeLinks.length === 0) {
            statusMsg.innerText = '❌ ไม่พบตอน';
            return;
        }

        statusMsg.innerText = `✅ พบ ${episodeLinks.length} ตอน`;
        episodeContainer.style.display = 'block';

        episodeLinks.forEach((link, index) => {
            const href = link.getAttribute('href');
            if (!href) return;

            const parts = href.split('/');
            const videoId = parts[parts.length - 1] || parts[parts.length - 2];

            const m3u8Url = `https://media.vdohls.com/${videoId}/playlist.m3u8`;

            const btn = document.createElement('button');
            btn.className = 'episode-btn';
            btn.innerText = `ตอนที่ ${index + 1}`;

            btn.onclick = () => {
                statusMsg.innerText = `▶️ ตอนที่ ${index + 1}`;
                playVideo(m3u8Url, btn);
            };

            episodeList.appendChild(btn);

            if (index === 0) playVideo(m3u8Url, btn);
        });

    } catch (err) {
        statusMsg.innerText = '❌ ' + err.message;
    }
}

/* =========================
   FETCH GRID MOVIE
========================= */
const f = async (url) => {
    const res = await fetch(`${PROXY_BASE}/api/proxy?url=${encodeURIComponent(url)}`);
    if (!res.ok) throw new Error('โหลดไม่ได้');

    const html = await res.text();
    const doc = new DOMParser().parseFromString(html, 'text/html');

    const boxes = doc.querySelectorAll('.grid-movie .box');
    const target = document.getElementById("grid-movie");

    boxes.forEach(box => {
        const link = box.querySelector('a');

        if (link) {
            const originalUrl = link.getAttribute('href');

            link.href = "#";
            link.onclick = (e) => {
                e.preventDefault();
                fetchAndExtractEpisodes(originalUrl);
            };
        }

        target.appendChild(box);
    });
};

/* =========================
   LOAD MOVIE LIST
========================= */
for (let i = 1; i <= 4; i++) {
    if (i === 1) {
        f('https://7-hd.com/');
    } else {
        f(`https://7-hd.com/page/${i}`);
    }
}

/* =========================
   EVENTS
========================= */
document.getElementById('search-btn').addEventListener('click', () => {
    const url = document.getElementById('movie-url').value.trim();
    if (!url) return alert('ใส่ลิงก์ก่อน');

    fetchAndExtractEpisodes(url);
});

document.getElementById('movie-url').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        document.getElementById('search-btn').click();
    }
});
</script>

</body>
</html>
